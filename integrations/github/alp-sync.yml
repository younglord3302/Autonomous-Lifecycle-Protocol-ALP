name: "ALP State Sync"

on:
  pull_request:
    types: [opened, reopened, closed, synchronize]

jobs:
  alp_sync:
    name: Sync PR status to ALP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ALP CLI
        # Prefer the published package; until @alp/cli is on npm, build it from
        # a checked-out monorepo instead:
        #   npm ci && npm run build --workspace @alp/cli
        run: npm install -g @alp/cli

      - name: Sync Task Status
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            // Extract ALP task ID from PR title or branch name
            // Convention: feat/task-id or title contains [task-id]
            let taskId = null;
            const branchMatch = pr.head.ref.match(/(?:feat|fix|chore)\/([a-zA-Z0-9_-]+)/);
            if (branchMatch) taskId = branchMatch[1];
            
            const titleMatch = pr.title.match(/\[([a-zA-Z0-9_-]+)\]/);
            if (titleMatch) taskId = titleMatch[1];

            if (!taskId) {
              console.log("No ALP task ID found in branch name or PR title.");
              return;
            }

            console.log(`Matched ALP task ID: ${taskId}`);

            // Determine target status
            let newStatus = '';
            if (pr.merged) {
              newStatus = '[x]'; // Done
            } else if (pr.state === 'closed') {
              newStatus = '[ ]'; // Reverted to Todo
            } else {
              newStatus = '[~]'; // In Progress / Review
            }

            console.log(`Setting task ${taskId} status to ${newStatus}`);

            const fs = require('fs');
            const path = require('path');
            const alpDir = path.resolve('.alp');
            let updatedFile = null;
            
            if (fs.existsSync(alpDir)) {
              const walk = (dir) => {
                if (updatedFile) return;
                const entries = fs.readdirSync(dir, { withFileTypes: true });
                for (const entry of entries) {
                  if (updatedFile) return;
                  const fullPath = path.join(dir, entry.name);
                  if (entry.isDirectory()) walk(fullPath);
                  else if (fullPath.endsWith('.alp')) {
                    let content = fs.readFileSync(fullPath, 'utf8');
                    if (content.includes(`id: ${taskId}`)) {
                      content = content.replace(/(id:\s*.*?\n\s*status:\s*).*?(\n)/, `$1${newStatus}$2`);
                      fs.writeFileSync(fullPath, content, 'utf8');
                      updatedFile = fullPath;
                    }
                  }
                }
              };
              walk(alpDir);
            }

            if (updatedFile) {
              const { execSync } = require('child_process');
              execSync(`git config --global user.name "github-actions[bot]"`);
              execSync(`git config --global user.email "github-actions[bot]@users.noreply.github.com"`);
              execSync(`git add "${updatedFile}"`);
              // Only commit if there are changes
              try {
                execSync(`git commit -m "chore(alp): update task ${taskId} status to ${newStatus}"`);
                execSync(`git push`);
                console.log("Successfully committed and pushed status update.");
                
                // Add a comment to the PR
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `🤖 **ALP Tracker:** Successfully updated task \`${taskId}\` status to \`${newStatus}\` in the workspace.`
                });
              } catch (e) {
                console.log("No changes to commit.");
              }
            } else {
              console.log(`Task ${taskId} not found in .alp directory.`);
            }
